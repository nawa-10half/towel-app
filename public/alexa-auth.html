<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かえたお – Alexa アカウント連携</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { font-size: 48px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 8px; }
    p { font-size: 14px; color: #6e6e73; line-height: 1.6; margin-bottom: 28px; }
    .code-input {
      width: 100%;
      padding: 14px 16px;
      font-size: 28px;
      font-family: 'Menlo', 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: 8px;
      text-align: center;
      border: 2px solid #d2d2d7;
      border-radius: 12px;
      outline: none;
      text-transform: uppercase;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    .code-input:focus { border-color: #007aff; }
    .btn-submit {
      width: 100%;
      padding: 14px 20px;
      background: #007aff;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-submit:hover { background: #0066d6; }
    .btn-submit:disabled { background: #b0c8f0; cursor: not-allowed; }
    .status {
      margin-top: 20px;
      font-size: 14px;
      color: #6e6e73;
      min-height: 20px;
    }
    .status.error { color: #d93025; }
    .status.success { color: #1e8e3e; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏠</div>
    <h1>かえたお</h1>
    <p>アプリの設定画面で生成した<br>6文字の連携コードを入力してください</p>

    <input
      class="code-input"
      id="codeInput"
      type="text"
      maxlength="6"
      placeholder="XXXXXX"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    >
    <button class="btn-submit" id="submitBtn" onclick="submitCode()">連携する</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const DEVICE_LINK_API = 'https://REDACTED.execute-api.ap-northeast-1.amazonaws.com/prod/alexa-link';

    // Alexaからのクエリパラメータを sessionStorage に退避
    const params = new URLSearchParams(location.search);
    if (params.get('redirect_uri')) {
      sessionStorage.setItem('alexa_redirect_uri', params.get('redirect_uri'));
      sessionStorage.setItem('alexa_state', params.get('state') || '');
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status ' + type;
    }

    async function submitCode() {
      const code = document.getElementById('codeInput').value.trim().toUpperCase();
      if (code.length !== 6) {
        setStatus('6文字のコードを入力してください', 'error');
        return;
      }

      const redirectUri = sessionStorage.getItem('alexa_redirect_uri');
      if (!redirectUri) {
        setStatus('エラー: Alexaの連携情報が見つかりません。Alexaアプリからやり直してください。', 'error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      setStatus('確認中...');

      try {
        const res = await fetch(DEVICE_LINK_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });

        const json = await res.json();
        if (!res.ok) {
          setStatus(json.error || '連携に失敗しました', 'error');
          btn.disabled = false;
          return;
        }

        const state = sessionStorage.getItem('alexa_state') || '';
        sessionStorage.removeItem('alexa_redirect_uri');
        sessionStorage.removeItem('alexa_state');

        setStatus('連携完了！Alexaアプリに戻ります...', 'success');
        const tokenUri = `${redirectUri}#access_token=${encodeURIComponent(json.refreshToken)}&token_type=Bearer&state=${encodeURIComponent(state)}`;
        setTimeout(() => { window.location.href = tokenUri; }, 800);
      } catch (err) {
        console.error(err);
        setStatus('ネットワークエラーが発生しました', 'error');
        btn.disabled = false;
      }
    }

    // Enterキーで送信
    document.getElementById('codeInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitCode();
    });
  </script>
</body>
</html>
