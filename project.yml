name: TowelApp
options:
  bundleIdPrefix: com.towel-app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: ja

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  TowelApp:
    type: application
    platform: iOS
    sources:
      - TowelApp
    # TODO: Widget復元 - Developer Program有効化後にコメントを外す
    # dependencies:
    #   - target: TowelWidgetExtension
    # TODO: Developer Program有効化後にentitlementsを復元する
    # entitlements:
    #   path: TowelApp/TowelApp.entitlements
    #   properties:
    #     com.apple.developer.icloud-container-identifiers:
    #       - iCloud.com.towel-app
    #     com.apple.developer.icloud-services:
    #       - CloudKit
    #     aps-environment: development
    info:
      path: TowelApp/Info.plist
      properties:
        CFBundleDisplayName: かえたお！
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: タオルの状態を診断するために写真を撮影します
        ConditionCheckAPIURL: $(CONDITION_CHECK_API_URL)
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - towelapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.towel-app.TowelApp
        INFOPLIST_FILE: TowelApp/Info.plist
        # TODO: Developer Program有効化後にコメントを外す
        # CODE_SIGN_ENTITLEMENTS: TowelApp/TowelApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CONDITION_CHECK_API_URL: https://1gqyhq717j.execute-api.ap-northeast-1.amazonaws.com/prod/assess-nova

