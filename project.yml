name: TowelApp
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
options:
  bundleIdPrefix: com.kaetao-app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: ja
  knownRegions: [Base, ja, en, zh-Hans, ko, fr, de, es, pt-BR, ru, it]

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  google-mobile-ads:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "12.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  TowelApp:
    type: application
    platform: iOS
    sources:
      - path: TowelApp
        excludes:
          - "Intents/**"
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseStorage
      - package: google-mobile-ads
        product: GoogleMobileAds

    entitlements:
      path: TowelApp/TowelApp.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.kaetao-app.TowelApp
    info:
      path: TowelApp/Info.plist
      properties:
        CFBundleDisplayName: かえたお
        CFBundleShortVersionString: "1.2.1"
        CFBundleVersion: "1"
        NSCameraUsageDescription: タオルの状態を診断するために写真を撮影します
        NSUserTrackingUsageDescription: あなたに最適な広告を表示するために使用します
        ConditionCheckAPIURL: $(CONDITION_CHECK_API_URL)
        RestoreCodeAuthURL: $(RESTORE_CODE_AUTH_URL)
        ProMonthlyProductID: $(PRO_MONTHLY_PRODUCT_ID)
        ProLifetimeProductID: $(PRO_LIFETIME_PRODUCT_ID)
        GADApplicationIdentifier: $(ADMOB_APP_ID)
        AdMobRewardedAdUnitID: $(ADMOB_REWARDED_AD_UNIT_ID)
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - towelapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaetao-app.TowelApp
        INFOPLIST_FILE: TowelApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: TowelApp/TowelApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CONDITION_CHECK_API_URL: $(CONDITION_CHECK_API_URL)
        RESTORE_CODE_AUTH_URL: $(RESTORE_CODE_AUTH_URL)
        PRO_MONTHLY_PRODUCT_ID: com.kaetao_app.TowelApp.pro.monthly
        PRO_LIFETIME_PRODUCT_ID: com.kaetao_app.TowelApp.pro.lifetime
        ADMOB_APP_ID: ca-app-pub-4773362073066777~5141753527
        ADMOB_REWARDED_AD_UNIT_ID: ca-app-pub-4773362073066777/2097767727

  TowelAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TowelAppTests
    dependencies:
      - target: TowelApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  TowelApp:
    build:
      targets:
        TowelApp: all
        TowelAppTests: [test]
    run:
      config: Debug
      storeKitConfiguration: TowelApp/Configuration.storekit
    test:
      config: Debug
      targets:
        - TowelAppTests
    archive:
      config: Release

