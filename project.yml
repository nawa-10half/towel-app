name: TowelApp
options:
  bundleIdPrefix: com.towel-app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  TowelApp:
    type: application
    platform: iOS
    sources:
      - TowelApp
    entitlements:
      path: TowelApp/TowelApp.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.towel-app
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
    info:
      path: TowelApp/Info.plist
      properties:
        CFBundleDisplayName: Towel
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.towel-app.TowelApp
        INFOPLIST_FILE: TowelApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: TowelApp/TowelApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
