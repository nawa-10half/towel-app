name: TowelApp
options:
  bundleIdPrefix: com.kaetao-app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: ja

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS.git
    from: "8.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  TowelApp:
    type: application
    platform: iOS
    sources:
      - TowelApp
    dependencies:
      - target: TowelWidgetExtension
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseStorage
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: GoogleSignIn-iOS
        product: GoogleSignInSwift
    entitlements:
      path: TowelApp/TowelApp.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.kaetao-app.TowelApp
        com.apple.developer.icloud-services:
          - CloudKit
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.kaetao-app.TowelApp
    info:
      path: TowelApp/Info.plist
      properties:
        CFBundleDisplayName: かえたお
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: タオルの状態を診断するために写真を撮影します
        ConditionCheckAPIURL: $(CONDITION_CHECK_API_URL)
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - towelapp
          - CFBundleURLSchemes:
              - com.googleusercontent.apps.157027032087-gaehu27c96u1v91tnj6qqdiktfimtaqk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaetao-app.TowelApp
        INFOPLIST_FILE: TowelApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: TowelApp/TowelApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CONDITION_CHECK_API_URL: https://REDACTED.execute-api.ap-northeast-1.amazonaws.com/prod/assess-nova

  TowelWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: TowelWidget
      - path: TowelApp/Models
        name: SharedModels
      - path: TowelApp/Services/SharedModelContainer.swift
        name: SharedModelContainer
      - path: TowelApp/Utilities/DateExtensions.swift
        name: DateExtensions
    info:
      path: TowelWidget/Info.plist
      properties:
        CFBundleDisplayName: TowelWidget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TowelWidget/TowelWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.kaetao-app.TowelApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaetao-app.TowelApp.TowelWidget
        INFOPLIST_FILE: TowelWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: TowelWidget/TowelWidget.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
