name: TowelApp
options:
  bundleIdPrefix: com.kaetao-app
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: ja

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  TowelApp:
    type: application
    platform: iOS
    sources:
      - path: TowelApp
        excludes:
          - "Intents/**"
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAuth
      - package: firebase-ios-sdk
        product: FirebaseFirestore
      - package: firebase-ios-sdk
        product: FirebaseStorage

    entitlements:
      path: TowelApp/TowelApp.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.com.kaetao-app.TowelApp
    info:
      path: TowelApp/Info.plist
      properties:
        CFBundleDisplayName: かえたお
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "1"
        NSCameraUsageDescription: タオルの状態を診断するために写真を撮影します
        ConditionCheckAPIURL: $(CONDITION_CHECK_API_URL)
        RestoreCodeAuthURL: $(RESTORE_CODE_AUTH_URL)
        UIRequiresFullScreen: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - towelapp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaetao-app.TowelApp
        INFOPLIST_FILE: TowelApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: TowelApp/TowelApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CONDITION_CHECK_API_URL: https://REDACTED.execute-api.ap-northeast-1.amazonaws.com/prod/assess-nova
        RESTORE_CODE_AUTH_URL: https://REDACTED.execute-api.ap-northeast-1.amazonaws.com/prod/restore-auth

  TowelAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TowelAppTests
    dependencies:
      - target: TowelApp
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

